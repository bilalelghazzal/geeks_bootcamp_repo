<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coloring Squares</title>
  <style>
    /* Universal box-sizing and removing default margin & padding */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  /* Main layout setup for full viewport height */
  body {
    display: flex;
    height: 100vh;
  }
  
  /* Sidebar settings with vertical layout and border */
  #sidebar {
    width: 280px;
    border-right: 2px solid #ccc;
    display: flex;
    flex-direction: column;
  }
  
  /* Clear button styled to fill sidebar width, bold font, and bottom border */
  #clear-btn {
    width: 100%;
    padding: 28px;
    font-size: 1.4rem;
    font-weight: bold;
    background: #fff;
    border: none;
    border-bottom: 2px solid #ccc;
    cursor: pointer;
  }
  
  /* Palette arranged in a grid with 3 columns */
  #palette {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  
  /* Swatch squares with 1:1 aspect ratio and pointer cursor */
  .swatch {
    aspect-ratio: 1;
    cursor: pointer;
  }
  
  /* Grid area takes up remaining space and scrolls if needed */
  #grid-area {
    flex: 1;
    overflow: auto;
  }
  
  /* The main grid: 50 columns of 20px each */
  #grid {
    display: grid;
    grid-template-columns: repeat(50, 20px);
  }
  
  /* Each cell is a 20x20px square with border and crosshair on hover */
  .cell {
    width: 20px;
    height: 20px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: crosshair;
  }
  </style>
</head>
<body>

  <div id="sidebar">
    <button id="clear-btn">Clear</button>
    <div id="palette"></div>

  </div>

  <div id="grid-area">
    <div id="grid"></div>
  </div>
  

  <script>
    const COLORS = [
    "#ff0000", "#ff4500", "#ff8c00",
    "#ffff00", "#7cfc00", "#00ff7f",
    "#008000", "#00ffcc", "#00ffff",
    "#87ceeb", "#1e90ff", "#0000cd",
    "#00008b", "#6a0dad", "#800080",
    "#ff69b4", "#ffb6c1", "#c0c0c0",
    "#808080", "#000000", "#ffffff"
];

let selectedColor = COLORS[0];

const paletteEl = document.getElementById("palette");

COLORS.forEach(function(color) {
    const swatch = document.createElement("div");
    swatch.classList.add("swatch");
    swatch.style.background = color;

    swatch.addEventListener("click", function() {
        selectedColor = color;
    });

    paletteEl.appendChild(swatch);
});


const grid = document.getElementById("grid"); 

let isMouseDown = false; 

document.addEventListener("mousedown", function() { isMouseDown = true; });
document.addEventListener("mouseup", function() { isMouseDown = false; });

for (let i = 0; i < 2000; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");

    cell.addEventListener("click", function() {
        cell.style.background = selectedColor;
    });

    cell.addEventListener("mouseover", function() {
        if (isMouseDown) {
            cell.style.background = selectedColor;
        }
    });

    grid.appendChild(cell);
}

// Clear
const clearBtn = document.getElementById("clear-btn");
clearBtn.addEventListener("click", function() {
    const allCells = document.querySelectorAll(".cell");
    allCells.forEach(function(cell) {
        cell.style.background = "#fff";
    });
})






  </script>
</body>
</html>
