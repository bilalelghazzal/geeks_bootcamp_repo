<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: Create a solar system</title>
        <style>
            body {
                background-color: black;
                padding: 10px;
            }
            .planet {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                text-align: center;
                padding: 10px;
                position: relative;
                border: 2px solid white;
            }
            .moon {
                position: absolute;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgb(237, 237, 237);
                border: 5px solid red;
            }
        </style>
    </head>
    <body>

    <section class="listPlanets"></section>

    <script>

// script.js
const planets = [
  { name: "Mercury", color: "gray",        moons: 0 },
  { name: "Venus",   color: "orange",      moons: 0 },
  { name: "Earth",   color: "blue",        moons: 1 },
  { name: "Mars",    color: "red",         moons: 2 },
  { name: "Jupiter", color: "brown",       moons: 4 },
  { name: "Saturn",  color: "goldenrod",   moons: 3 },
  { name: "Uranus",  color: "lightblue",   moons: 2 },
  { name: "Neptune", color: "darkblue",    moons: 1 }
];

const section = document.querySelector(".listPlanets");

for (let i = 0; i < planets.length; i++) {

  // create the planet div
  let div = document.createElement("div");
  div.classList.add("planet");
  div.style.backgroundColor = planets[i].color;
  div.textContent = planets[i].name;

  for (let j = 0; j < planets[i].moons; j++) {
    let moon = document.createElement("div");
    moon.classList.add("moon");
    moon.style.top = (j * 40) + "px";   
    moon.style.right = "-40px";         
    div.appendChild(moon);
  }

  // append planet to section
  section.appendChild(div);
}
    </script>
    </body>
</html>
